<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Dreisamkind</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      pointer-events: none;
    }

    /* liquid glass tag */
    .tag {
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 100px;
      padding: 7px 22px;
      color: rgba(255, 255, 255, 0.88);
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.30),
        inset 0 -1px 0 rgba(0, 0, 0, 0.10),
        0 8px 32px rgba(0, 0, 0, 0.20);
    }

    .word {
      font-family: 'Montserrat', sans-serif;
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #ffffff;
      user-select: none;
    }

    /* background toggle */
    .bg-toggle {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 100px;
      cursor: pointer;
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.20),
        0 4px 16px rgba(0, 0, 0, 0.20);
      transition: background 0.2s, border-color 0.2s;
    }
    .bg-toggle:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.30);
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.30);
      transition: background 0.3s;
    }
    .dot.active {
      background: rgba(255, 255, 255, 0.95);
    }
  </style>
</head>
<body>

<div class="stage">
  <div class="tag">coming soon</div>
  <span class="word">Dreisamkind</span>
</div>

<button class="bg-toggle" aria-label="Hintergrund wechseln">
  <span class="dot active" id="dot0"></span>
  <span class="dot" id="dot1"></span>
</button>

<script type="module">
import { Renderer, Program, Mesh, Triangle } from 'https://esm.sh/ogl';

// ── shared state ───────────────────────────────────────────────────────────
let activeBg = 'blinds'; // 'blinds' | 'waves'

// ══════════════════════════════════════════════════════════════════════════
// GRADIENT BLINDS
// ══════════════════════════════════════════════════════════════════════════

// ── config ─────────────────────────────────────────────────────────────────
const GRADIENT_COLORS  = ['#94a3b8', '#5227FF'];
const ANGLE            = 20;
const NOISE            = 0.5;
const BLIND_COUNT      = 16;
const BLIND_MIN_WIDTH  = 60;
const MOUSE_DAMPENING  = 0.15;
const SPOTLIGHT_RADIUS = 0.5;
const SPOTLIGHT_SOFT   = 1;
const SPOTLIGHT_OPC    = 1;
const MIRROR_GRADIENT  = false;
const DISTORT          = 15;
const SHINE_DIR        = 'left';

// ── helpers ────────────────────────────────────────────────────────────────
const MAX_COLORS = 8;

const hexToRGB = hex => {
  const c = hex.replace('#', '').padEnd(6, '0');
  return [
    parseInt(c.slice(0, 2), 16) / 255,
    parseInt(c.slice(2, 4), 16) / 255,
    parseInt(c.slice(4, 6), 16) / 255,
  ];
};

const prepStops = stops => {
  const base = (stops?.length ? stops : ['#FF9FFC', '#5227FF']).slice(0, MAX_COLORS);
  if (base.length === 1) base.push(base[0]);
  while (base.length < MAX_COLORS) base.push(base[base.length - 1]);
  const count = Math.max(2, Math.min(MAX_COLORS, stops?.length ?? 2));
  return { arr: base.map(hexToRGB), count };
};

// ── renderer ───────────────────────────────────────────────────────────────
const renderer = new Renderer({ dpr: window.devicePixelRatio || 1, alpha: true, antialias: true });
const gl       = renderer.gl;
const canvas   = gl.canvas;
canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;display:block;opacity:1;transition:opacity 0.6s ease;pointer-events:auto;';
document.body.insertBefore(canvas, document.body.firstChild);

// ── shaders ────────────────────────────────────────────────────────────────
const vertex = /* glsl */`
attribute vec2 position;
attribute vec2 uv;
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position, 0.0, 1.0);
}`;

const fragment = /* glsl */`
#ifdef GL_ES
precision mediump float;
#endif

uniform vec3  iResolution;
uniform vec2  iMouse;
uniform float iTime;
uniform float uAngle;
uniform float uNoise;
uniform float uBlindCount;
uniform float uSpotlightRadius;
uniform float uSpotlightSoftness;
uniform float uSpotlightOpacity;
uniform float uMirror;
uniform float uDistort;
uniform float uShineFlip;
uniform vec3  uColor0, uColor1, uColor2, uColor3;
uniform vec3  uColor4, uColor5, uColor6, uColor7;
uniform int   uColorCount;

varying vec2 vUv;

float rand(vec2 co) {
  return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453);
}

vec2 rotate2D(vec2 p, float a) {
  float c = cos(a), s = sin(a);
  return mat2(c, -s, s, c) * p;
}

vec3 gradientColor(float t) {
  float tt = clamp(t, 0.0, 1.0);
  int n = uColorCount < 2 ? 2 : uColorCount;
  float sc = tt * float(n - 1);
  float sg = floor(sc);
  float f  = fract(sc);
  if (sg < 1.0)              return mix(uColor0, uColor1, f);
  if (sg < 2.0 && n > 2)    return mix(uColor1, uColor2, f);
  if (sg < 3.0 && n > 3)    return mix(uColor2, uColor3, f);
  if (sg < 4.0 && n > 4)    return mix(uColor3, uColor4, f);
  if (sg < 5.0 && n > 5)    return mix(uColor4, uColor5, f);
  if (sg < 6.0 && n > 6)    return mix(uColor5, uColor6, f);
  if (sg < 7.0 && n > 7)    return mix(uColor6, uColor7, f);
  if (n > 7) return uColor7; if (n > 6) return uColor6;
  if (n > 5) return uColor5; if (n > 4) return uColor4;
  if (n > 3) return uColor3; if (n > 2) return uColor2;
  return uColor1;
}

void mainImage(out vec4 fragColor, in vec2 fragCoord) {
  vec2 uv0    = fragCoord / iResolution.xy;
  float asp   = iResolution.x / iResolution.y;
  vec2 p      = uv0 * 2.0 - 1.0;
  p.x        *= asp;
  vec2 pr     = rotate2D(p, uAngle);
  pr.x       /= asp;
  vec2 uv     = pr * 0.5 + 0.5;
  vec2 uvM    = uv;

  if (uDistort > 0.0) {
    float w = 0.01 * uDistort;
    uvM.x  += sin(uvM.y * 6.0) * w;
    uvM.y  += cos(uvM.x * 6.0) * w;
  }

  float t = uMirror > 0.5 ? 1.0 - abs(1.0 - 2.0 * fract(uvM.x)) : uvM.x;
  vec3 base = gradientColor(t);

  vec2 off  = vec2(iMouse.x / iResolution.x, iMouse.y / iResolution.y);
  float d   = length(uv0 - off);
  float dn  = d / max(uSpotlightRadius, 1e-4);
  float spot = (1.0 - 2.0 * pow(dn, uSpotlightSoftness)) * uSpotlightOpacity;

  float stripe = fract(uvM.x * max(uBlindCount, 1.0));
  if (uShineFlip > 0.5) stripe = 1.0 - stripe;

  vec3 col = vec3(spot) + base - vec3(stripe);
  col += (rand(gl_FragCoord.xy + iTime) - 0.5) * uNoise;
  fragColor = vec4(col, 1.0);
}

void main() {
  vec4 color;
  mainImage(color, vUv * iResolution.xy);
  gl_FragColor = color;
}`;

// ── uniforms ───────────────────────────────────────────────────────────────
const { arr: colorArr, count: colorCount } = prepStops(GRADIENT_COLORS);
const uniforms = {
  iResolution:        { value: [gl.drawingBufferWidth, gl.drawingBufferHeight, 1] },
  iMouse:             { value: [0, 0] },
  iTime:              { value: 0 },
  uAngle:             { value: (ANGLE * Math.PI) / 180 },
  uNoise:             { value: NOISE },
  uBlindCount:        { value: Math.max(1, BLIND_COUNT) },
  uSpotlightRadius:   { value: SPOTLIGHT_RADIUS },
  uSpotlightSoftness: { value: SPOTLIGHT_SOFT },
  uSpotlightOpacity:  { value: SPOTLIGHT_OPC },
  uMirror:            { value: MIRROR_GRADIENT ? 1 : 0 },
  uDistort:           { value: DISTORT },
  uShineFlip:         { value: SHINE_DIR === 'right' ? 1 : 0 },
  uColor0:            { value: colorArr[0] },
  uColor1:            { value: colorArr[1] },
  uColor2:            { value: colorArr[2] },
  uColor3:            { value: colorArr[3] },
  uColor4:            { value: colorArr[4] },
  uColor5:            { value: colorArr[5] },
  uColor6:            { value: colorArr[6] },
  uColor7:            { value: colorArr[7] },
  uColorCount:        { value: colorCount },
};

const program  = new Program(gl, { vertex, fragment, uniforms });
const geometry = new Triangle(gl);
const mesh     = new Mesh(gl, { geometry, program });

// ── resize ─────────────────────────────────────────────────────────────────
const mouseTarget = [0, 0];
let firstResize = true;

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;

  renderer.setSize(w, h);
  canvas.style.top    = '0';
  canvas.style.left   = '0';
  canvas.style.width  = '100%';
  canvas.style.height = '100%';
  uniforms.iResolution.value = [gl.drawingBufferWidth, gl.drawingBufferHeight, 1];

  const maxBlinds = Math.max(1, Math.floor(w / BLIND_MIN_WIDTH));
  uniforms.uBlindCount.value = Math.max(1, Math.min(BLIND_COUNT, maxBlinds));

  if (firstResize) {
    firstResize = false;
    const cx = gl.drawingBufferWidth  / 2;
    const cy = gl.drawingBufferHeight / 2;
    uniforms.iMouse.value = [cx, cy];
    mouseTarget[0] = cx;
    mouseTarget[1] = cy;
  }
}
resize();
window.addEventListener('resize', resize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

// ── mouse ──────────────────────────────────────────────────────────────────
canvas.addEventListener('pointermove', e => {
  const rect  = canvas.getBoundingClientRect();
  const scale = renderer.dpr || 1;
  mouseTarget[0] = (e.clientX - rect.left) * scale;
  mouseTarget[1] = (rect.height - (e.clientY - rect.top)) * scale;
});

// ── loop ───────────────────────────────────────────────────────────────────
let lastTime = 0;
(function blindsLoop(t) {
  requestAnimationFrame(blindsLoop);
  uniforms.iTime.value = t * 0.001;

  const dt  = lastTime ? (t - lastTime) / 1000 : 0;
  lastTime  = t;
  const tau = Math.max(1e-4, MOUSE_DAMPENING);
  const k   = Math.min(1, 1 - Math.exp(-dt / tau));
  const cur = uniforms.iMouse.value;
  cur[0] += (mouseTarget[0] - cur[0]) * k;
  cur[1] += (mouseTarget[1] - cur[1]) * k;

  if (activeBg === 'blinds') renderer.render({ scene: mesh });
})(0);


// ══════════════════════════════════════════════════════════════════════════
// LINE WAVES
// ══════════════════════════════════════════════════════════════════════════

// ── config ─────────────────────────────────────────────────────────────────
const LW_SPEED           = 0.3;
const LW_INNER_LINES     = 32.0;
const LW_OUTER_LINES     = 36.0;
const LW_WARP_INTENSITY  = 1.0;
const LW_ROTATION        = -45;
const LW_EDGE_FADE       = 0.0;
const LW_COLOR_CYCLE     = 1.0;
const LW_BRIGHTNESS      = 0.2;
const LW_COLOR1          = '#ffffff';
const LW_COLOR2          = '#ffffff';
const LW_COLOR3          = '#ffffff';
const LW_MOUSE_INFLUENCE = 2.0;

const hexToVec3 = hex => {
  const h = hex.replace('#', '');
  return [
    parseInt(h.slice(0, 2), 16) / 255,
    parseInt(h.slice(2, 4), 16) / 255,
    parseInt(h.slice(4, 6), 16) / 255,
  ];
};

// ── renderer ───────────────────────────────────────────────────────────────
const lwRenderer = new Renderer({ dpr: window.devicePixelRatio || 1, alpha: true, premultipliedAlpha: false });
const lwGl = lwRenderer.gl;
lwGl.clearColor(0, 0, 0, 0);
const wavesCanvas = lwGl.canvas;
wavesCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;display:block;opacity:0;transition:opacity 0.6s ease;pointer-events:none;';
document.body.insertBefore(wavesCanvas, document.body.firstChild);

// ── shaders ────────────────────────────────────────────────────────────────
const lwVertex = /* glsl */`
attribute vec2 uv;
attribute vec2 position;
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position, 0, 1);
}`;

const lwFragment = /* glsl */`
precision highp float;

uniform float uTime;
uniform vec3  uResolution;
uniform float uSpeed;
uniform float uInnerLines;
uniform float uOuterLines;
uniform float uWarpIntensity;
uniform float uRotation;
uniform float uEdgeFadeWidth;
uniform float uColorCycleSpeed;
uniform float uBrightness;
uniform vec3  uColor1;
uniform vec3  uColor2;
uniform vec3  uColor3;
uniform vec2  uMouse;
uniform float uMouseInfluence;

#define HALF_PI 1.5707963

float hashF(float n) {
  return fract(sin(n * 127.1) * 43758.5453123);
}

float smoothNoise(float x) {
  float i = floor(x);
  float f = fract(x);
  float u = f * f * (3.0 - 2.0 * f);
  return mix(hashF(i), hashF(i + 1.0), u);
}

float displaceA(float coord, float t) {
  float result = sin(coord * 2.123) * 0.2;
  result += sin(coord * 3.234 + t * 4.345) * 0.1;
  result += sin(coord * 0.589 + t * 0.934) * 0.5;
  return result;
}

float displaceB(float coord, float t) {
  float result = sin(coord * 1.345) * 0.3;
  result += sin(coord * 2.734 + t * 3.345) * 0.2;
  result += sin(coord * 0.189 + t * 0.934) * 0.3;
  return result;
}

vec2 rotate2D(vec2 p, float angle) {
  float c = cos(angle);
  float s = sin(angle);
  return vec2(p.x * c - p.y * s, p.x * s + p.y * c);
}

void main() {
  vec2 coords = gl_FragCoord.xy / uResolution.xy;
  coords = coords * 2.0 - 1.0;
  coords = rotate2D(coords, uRotation);

  float halfT = uTime * uSpeed * 0.5;
  float fullT = uTime * uSpeed;

  vec2 mPos = rotate2D(uMouse * 2.0 - 1.0, uRotation);
  float mDist = length(coords - mPos);
  float mouseWarp = uMouseInfluence * exp(-mDist * mDist * 4.0);

  float warpAx = coords.x + displaceA(coords.y, halfT) * uWarpIntensity + mouseWarp;
  float warpAy = coords.y - displaceA(coords.x * cos(fullT) * 1.235, halfT) * uWarpIntensity;
  float warpBx = coords.x + displaceB(coords.y, halfT) * uWarpIntensity + mouseWarp;
  float warpBy = coords.y - displaceB(coords.x * sin(fullT) * 1.235, halfT) * uWarpIntensity;

  vec2 fieldA  = vec2(warpAx, warpAy);
  vec2 fieldB  = vec2(warpBx, warpBy);
  vec2 blended = mix(fieldA, fieldB, mix(fieldA, fieldB, 0.5));

  float fadeTop    = smoothstep(uEdgeFadeWidth, uEdgeFadeWidth + 0.4, blended.y);
  float fadeBottom = smoothstep(-uEdgeFadeWidth, -(uEdgeFadeWidth + 0.4), blended.y);
  float vMask = 1.0 - max(fadeTop, fadeBottom);

  float tileCount = mix(uOuterLines, uInnerLines, vMask);
  float scaledY   = blended.y * tileCount;
  float nY        = smoothNoise(abs(scaledY));

  float ridge = pow(
    step(abs(nY - blended.x) * 2.0, HALF_PI) * cos(2.0 * (nY - blended.x)),
    5.0
  );

  float lines = 0.0;
  for (float i = 1.0; i < 3.0; i += 1.0) {
    lines += pow(max(fract(scaledY), fract(-scaledY)), i * 2.0);
  }

  float pattern = vMask * lines;
  float cycleT  = fullT * uColorCycleSpeed;

  float rChannel = (pattern + lines * ridge) * (cos(blended.y + cycleT * 0.234) * 0.5 + 1.0);
  float gChannel = (pattern + vMask  * ridge) * (sin(blended.x + cycleT * 1.745) * 0.5 + 1.0);
  float bChannel = (pattern + lines * ridge) * (cos(blended.x + cycleT * 0.534) * 0.5 + 1.0);

  vec3  col   = (rChannel * uColor1 + gChannel * uColor2 + bChannel * uColor3) * uBrightness;
  float alpha = clamp(length(col), 0.0, 1.0);

  gl_FragColor = vec4(col, alpha);
}`;

// ── uniforms ───────────────────────────────────────────────────────────────
const lwUniforms = {
  uTime:            { value: 0 },
  uResolution:      { value: [lwGl.drawingBufferWidth, lwGl.drawingBufferHeight, lwGl.drawingBufferWidth / lwGl.drawingBufferHeight] },
  uSpeed:           { value: LW_SPEED },
  uInnerLines:      { value: LW_INNER_LINES },
  uOuterLines:      { value: LW_OUTER_LINES },
  uWarpIntensity:   { value: LW_WARP_INTENSITY },
  uRotation:        { value: (LW_ROTATION * Math.PI) / 180 },
  uEdgeFadeWidth:   { value: LW_EDGE_FADE },
  uColorCycleSpeed: { value: LW_COLOR_CYCLE },
  uBrightness:      { value: LW_BRIGHTNESS },
  uColor1:          { value: hexToVec3(LW_COLOR1) },
  uColor2:          { value: hexToVec3(LW_COLOR2) },
  uColor3:          { value: hexToVec3(LW_COLOR3) },
  uMouse:           { value: new Float32Array([0.5, 0.5]) },
  uMouseInfluence:  { value: LW_MOUSE_INFLUENCE },
};

const lwProgram  = new Program(lwGl, { vertex: lwVertex, fragment: lwFragment, uniforms: lwUniforms });
const lwGeometry = new Triangle(lwGl);
const lwMesh     = new Mesh(lwGl, { geometry: lwGeometry, program: lwProgram });

// ── resize ─────────────────────────────────────────────────────────────────
function lwResize() {
  lwRenderer.setSize(window.innerWidth, window.innerHeight);
  wavesCanvas.style.top    = '0';
  wavesCanvas.style.left   = '0';
  wavesCanvas.style.width  = '100%';
  wavesCanvas.style.height = '100%';
  lwUniforms.uResolution.value = [lwGl.drawingBufferWidth, lwGl.drawingBufferHeight, lwGl.drawingBufferWidth / lwGl.drawingBufferHeight];
}
lwResize();
window.addEventListener('resize', lwResize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', lwResize);

// ── mouse ──────────────────────────────────────────────────────────────────
const lwMouseTarget  = [0.5, 0.5];
const lwMouseCurrent = [0.5, 0.5];

wavesCanvas.addEventListener('pointermove', e => {
  const rect = wavesCanvas.getBoundingClientRect();
  lwMouseTarget[0] = (e.clientX - rect.left) / rect.width;
  lwMouseTarget[1] = 1.0 - (e.clientY - rect.top) / rect.height;
});
wavesCanvas.addEventListener('pointerleave', () => {
  lwMouseTarget[0] = 0.5;
  lwMouseTarget[1] = 0.5;
});

// ── loop ───────────────────────────────────────────────────────────────────
(function wavesLoop(t) {
  requestAnimationFrame(wavesLoop);
  lwUniforms.uTime.value = t * 0.001;

  lwMouseCurrent[0] += 0.05 * (lwMouseTarget[0] - lwMouseCurrent[0]);
  lwMouseCurrent[1] += 0.05 * (lwMouseTarget[1] - lwMouseCurrent[1]);
  lwUniforms.uMouse.value[0] = lwMouseCurrent[0];
  lwUniforms.uMouse.value[1] = lwMouseCurrent[1];

  if (activeBg === 'waves') lwRenderer.render({ scene: lwMesh });
})(0);


// ══════════════════════════════════════════════════════════════════════════
// TOGGLE
// ══════════════════════════════════════════════════════════════════════════

const dot0 = document.getElementById('dot0');
const dot1 = document.getElementById('dot1');

document.querySelector('.bg-toggle').addEventListener('click', () => {
  if (activeBg === 'blinds') {
    activeBg = 'waves';
    canvas.style.opacity       = '0';
    canvas.style.pointerEvents = 'none';
    wavesCanvas.style.opacity       = '1';
    wavesCanvas.style.pointerEvents = 'auto';
    dot0.classList.remove('active');
    dot1.classList.add('active');
  } else {
    activeBg = 'blinds';
    canvas.style.opacity       = '1';
    canvas.style.pointerEvents = 'auto';
    wavesCanvas.style.opacity       = '0';
    wavesCanvas.style.pointerEvents = 'none';
    dot0.classList.add('active');
    dot1.classList.remove('active');
  }
});
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
